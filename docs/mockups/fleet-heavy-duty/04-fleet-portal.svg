  <line x1="104" y1="666" x2="1336" y2="666" stroke="#F4F6FA"/>
  <g style="color:#0F9C96"><use href="#ic-truck" x="104" y="682" width="18" height="18"/></g><text x="132" y="695" class="val">Unit 7</text><text x="320" y="695" class="cell">Dry van trailer</text><rect x="500" y="682" width="138" height="20" rx="10" fill="#FEF4E6"/><text x="569" y="696" class="pill" font-size="9.5" fill="#A8720F" text-anchor="middle">Ready for pickup</text><text x="820" y="695" class="mut">Mississauga shop</text><text x="1336" y="695" class="pill" font-size="11.5" fill="#0F9C96" text-anchor="end">ok</text>
