  </g>
  <line x1="104" y1="766" x2="1336" y2="766" stroke="#ECEFF4"/>
  <g style="color:#5A6A85"><use href="#ic-doc" x="104" y="784" width="16" height="16"/></g><text x="128" y="797" class="mut" font-size="12">Inspection certificates, invoices &amp; statements available under Documents · self-service, fewer status calls.</text>
