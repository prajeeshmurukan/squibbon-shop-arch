<svg viewBox="0 0 1440 860" xmlns="http://www.w3.org/2000/svg" font-family="'Plus Jakarta Sans','Inter','Segoe UI',system-ui,sans-serif" role="img" aria-labelledby="t">
  <title id="t">Squibbon Shop — Fleet customer portal</title>
