  <text x="324" y="594" class="lbl" font-size="10">HOW IT WORKS</text>
  <text x="324" y="616" class="mut" font-size="11.5">DVIRs arrive from the driver app / telematics.</text>
  <text x="324" y="636" class="mut" font-size="11.5">Major defects flag the unit out-of-service until</text>
  <text x="324" y="656" class="mut" font-size="11.5">resolved. Selected defects become jobs on a new</text>
  <text x="324" y="676" class="mut" font-size="11.5">work order, and the certified repair is written</text>
  <text x="324" y="696" class="mut" font-size="11.5">back to the DVIR &amp; the NSC/DOT compliance log.</text>
  <text x="324" y="724" class="pill" font-size="11" fill="#c479c2">Linked to Maintenance compliance →</text>

