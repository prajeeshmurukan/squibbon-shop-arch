  <text x="934" y="592" class="val" font-size="13">4 / 4 tires registered with Michelin</text>
  <text x="934" y="612" class="mut" font-size="11">Electronic registration submitted · recall traceability satisfied</text>
  <rect x="884" y="644" width="508" height="96" rx="10" fill="#F4F6FB"/>
  <text x="904" y="670" class="lbl" font-size="10">WHY IT MATTERS</text>
  <text x="904" y="692" class="mut" font-size="11.5">Tire registration is a manufacturer/NHTSA traceability requirement so the</text>
  <text x="904" y="710" class="mut" font-size="11.5">customer is reachable in a recall. Squibbon validates the DOT, checks for an</text>
  <text x="904" y="728" class="mut" font-size="11.5">active recall before fitment, and registers automatically at point of sale.</text>
