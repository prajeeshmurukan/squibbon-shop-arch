  <text x="280" y="116" font-size="22" font-weight="700" fill="#2A3547">Marketing settings</text>
  <text x="280" y="138" font-size="13" fill="#5A6A85">Consent, sender identity &amp; quiet hours · Canada (CASL) defaults applied</text>

  <!-- CASL banner -->
  <rect x="280" y="156" width="1136" height="54" rx="12" fill="#E6FBF5" stroke="#BDEBDD"/>
  <g style="color:#0F9C96"><use href="#ic-shield" x="300" y="172" width="22" height="22"/></g>
  <text x="334" y="180" font-size="13.5" font-weight="700" fill="#0B7A6E">CASL-ready</text>
  <text x="334" y="199" font-size="12" fill="#3A7A6E">Sender identity, one-click unsubscribe and per-customer consent tracking are active on every commercial message.</text>
  <text x="1396" y="188" font-size="11.5" font-weight="600" fill="#0F9C96" text-anchor="end">Last reviewed 12 Jun 2026</text>

  <!-- LEFT COLUMN -->
  <!-- Card A: Sender identity -->
  <rect x="280" y="228" width="556" height="222" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="304" y="258" class="h" font-size="15">Sender identity</text><text x="304" y="277" class="mut" font-size="11.5">Appears in the footer of every commercial message — required by CASL §6</text>
  <text x="304" y="306" class="lbl" font-size="11">Business name</text><rect x="304" y="314" width="244" height="34" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="318" y="335" class="val" font-size="12.5">Squibbon Auto Care</text>
  <text x="568" y="306" class="lbl" font-size="11">Reply-to email</text><rect x="568" y="314" width="244" height="34" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="582" y="335" class="val" font-size="12.5">service@squibbonauto.ca</text>
  <text x="304" y="372" class="lbl" font-size="11">Mailing address</text><rect x="304" y="380" width="244" height="34" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="318" y="401" class="val" font-size="11.5">120 Lakeshore Rd E, Mississauga ON</text>
  <text x="568" y="372" class="lbl" font-size="11">SMS sender ID</text><rect x="568" y="380" width="244" height="34" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="582" y="401" class="val" font-size="12.5">+1 905 555 0142</text>
  <text x="304" y="436" class="mut" font-size="11">Mailing address &amp; an unsubscribe path are inserted automatically — they cannot be removed.</text>

  <!-- Card B: Consent defaults -->
  <rect x="280" y="466" width="556" height="266" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="304" y="496" class="h" font-size="15">Consent defaults</text>
  <text x="304" y="524" class="lbl" font-size="11.5">Consent basis recognised</text>
  <rect x="304" y="534" width="250" height="40" rx="8" fill="#FBF3FB" stroke="#EBD3EA"/><circle cx="322" cy="554" r="6" fill="#c479c2"/><circle cx="322" cy="554" r="2.4" fill="#fff"/><text x="338" y="551" class="val" font-size="12">Express (opt-in)</text><text x="338" y="567" class="mut" font-size="10">Checkbox / web form</text>
  <rect x="562" y="534" width="250" height="40" rx="8" fill="#FBF3FB" stroke="#EBD3EA"/><circle cx="580" cy="554" r="6" fill="#c479c2"/><circle cx="580" cy="554" r="2.4" fill="#fff"/><text x="596" y="551" class="val" font-size="12">Implied (existing relationship)</text><text x="596" y="567" class="mut" font-size="10">From a recent transaction</text>
  <text x="304" y="602" class="lbl" font-size="11">Implied-consent window</text><rect x="304" y="610" width="508" height="34" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="318" y="631" class="val" font-size="12.5">24 months after the last transaction or inquiry</text><g style="color:#8A95A5"><use href="#ic-chev" x="778" y="619" width="18" height="18"/></g>
  <rect x="304" y="658" width="508" height="30" rx="8" fill="#FFFFFF"/><text x="304" y="678" class="val" font-size="12.5">Require double opt-in for web sign-ups</text><rect x="778" y="666" width="34" height="20" rx="10" fill="#c479c2"/><circle cx="803" cy="676" r="7" fill="#fff"/>
  <rect x="304" y="698" width="508" height="22" /><text x="304" y="714" class="mut" font-size="11">Transactional messages (estimates, RO status, invoices) are always allowed — never consent-gated.</text>

  <!-- RIGHT COLUMN -->
  <!-- Card C: Unsubscribe -->
  <rect x="860" y="228" width="556" height="166" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="884" y="258" class="h" font-size="15">Unsubscribe handling</text>
  <text x="884" y="292" class="val" font-size="12.5">Honour unsubscribe requests</text><rect x="1230" y="280" width="162" height="30" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="1244" y="300" class="val" font-size="11.5">Immediately</text><g style="color:#8A95A5"><use href="#ic-chev" x="1358" y="285" width="18" height="18"/></g>
  <text x="884" y="332" class="val" font-size="12.5">Auto-insert unsubscribe link &amp; STOP keyword</text><rect x="1358" y="320" width="34" height="20" rx="10" fill="#c479c2"/><circle cx="1383" cy="330" r="7" fill="#fff"/>
  <text x="884" y="362" class="lbl" font-size="11">Opt-out keywords</text>
  <g font-size="10.5" font-weight="600" fill="#5A6A85"><rect x="980" y="350" width="56" height="20" rx="10" fill="#EEF1F6"/><text x="1008" y="364" text-anchor="middle">STOP</text><rect x="1044" y="350" width="62" height="20" rx="10" fill="#EEF1F6"/><text x="1075" y="364" text-anchor="middle">ARRÊT</text><rect x="1114" y="350" width="100" height="20" rx="10" fill="#EEF1F6"/><text x="1164" y="364" text-anchor="middle">UNSUBSCRIBE</text></g>

  <!-- Card D: Quiet hours -->
  <rect x="860" y="410" width="556" height="170" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="884" y="440" class="h" font-size="15">Quiet hours &amp; frequency</text>
  <text x="884" y="474" class="val" font-size="12.5">Quiet hours (customer local time)</text><rect x="1210" y="462" width="182" height="30" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="1224" y="482" class="val" font-size="11.5">9:00 PM – 8:00 AM</text>
  <text x="884" y="514" class="val" font-size="12.5">Max commercial messages per customer</text><rect x="1252" y="502" width="140" height="30" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/><text x="1266" y="522" class="val" font-size="11.5">1 per week</text><g style="color:#8A95A5"><use href="#ic-chev" x="1358" y="507" width="18" height="18"/></g>
  <text x="884" y="554" class="val" font-size="12.5">Exempt transactional &amp; service reminders from caps</text><rect x="1358" y="542" width="34" height="20" rx="10" fill="#c479c2"/><circle cx="1383" cy="552" r="7" fill="#fff"/>

  <!-- Card E: Channels -->
  <rect x="860" y="596" width="556" height="136" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="884" y="626" class="h" font-size="15">Connected channels</text>
  <g font-size="12.5">
  <circle cx="894" cy="654" r="9" fill="#FFEBFE"/><g style="color:#c479c2"><use href="#ic-send" x="887" y="647" width="14" height="14"/></g><text x="914" y="658" class="val">Email · squibbonauto.ca</text><rect x="1300" y="644" width="92" height="20" rx="10" fill="#E6FBF5"/><g style="color:#0F9C96"><use href="#ic-check" x="1312" y="646" width="15" height="15"/></g><text x="1356" y="658" font-size="10.5" font-weight="700" fill="#0F9C96" text-anchor="middle">Verified</text>
  <circle cx="894" cy="684" r="9" fill="#EAF2FE"/><text x="894" y="688" font-size="10" font-weight="700" fill="#1A73E8" text-anchor="middle">G</text><text x="914" y="688" class="val">Google Business Profile</text><rect x="1290" y="674" width="102" height="20" rx="10" fill="#E6FBF5"/><g style="color:#0F9C96"><use href="#ic-check" x="1302" y="676" width="15" height="15"/></g><text x="1352" y="688" font-size="10.5" font-weight="700" fill="#0F9C96" text-anchor="middle">Connected</text>
  <circle cx="1090" cy="684" r="9" fill="#EAF0FB"/><text x="1090" y="688" font-size="10" font-weight="700" fill="#1877F2" text-anchor="middle">f</text><text x="1110" y="688" class="val">Facebook</text>
  </g>
  <text x="884" y="718" class="mut" font-size="10.5">Squibbon sends &amp; tracks consent; reviews are posted on Google / Facebook — Squibbon doesn't replace them.</text>
