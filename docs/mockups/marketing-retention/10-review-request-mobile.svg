<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="'Plus Jakarta Sans','Inter','Segoe UI',system-ui,sans-serif" role="img" aria-labelledby="t">
  <title id="t">Squibbon Shop — Customer review request (mobile)</title>
  <defs>
    <filter id="ph" x="-12%" y="-6%" width="124%" height="112%"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2A3547" flood-opacity="0.18"/></filter>
    <symbol id="bstar" viewBox="0 0 44 44"><path d="M22 3 l5.7 11.6 12.8 1.9 -9.3 9 2.2 12.7 L22 33.2 10.6 39.1 12.8 26.4 3.5 17.4 16.3 15.5z" fill="#F5A623"/></symbol>
    <symbol id="ostar" viewBox="0 0 44 44"><path d="M22 3 l5.7 11.6 12.8 1.9 -9.3 9 2.2 12.7 L22 33.2 10.6 39.1 12.8 26.4 3.5 17.4 16.3 15.5z" fill="#FFF6E6" stroke="#F0C56B" stroke-width="2" stroke-linejoin="round"/></symbol>
    <g id="ar" fill="none" stroke="#C0CAD8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12 H30 M22 5 l8 7 -8 7"/></g>
  </defs>
  <style>
    .cap{fill:#2A3547;font-weight:700}.capm{fill:#8A95A5;font-weight:500}
  </style>
  <rect width="1200" height="900" fill="#F4F6FB"/>
  <text x="60" y="54" font-size="24" font-weight="700" fill="#2A3547">Customer review request</text>
  <text x="60" y="80" font-size="13.5" fill="#5A6A85">What the customer sees · sent only to consented customers after a paid work order · bilingual</text>

  <!-- ===== PHONE A — SMS ===== -->
  <g filter="url(#ph)"><rect x="60" y="120" width="320" height="660" rx="42" fill="#1F2733"/></g>
  <rect x="70" y="130" width="300" height="640" rx="34" fill="#FFFFFF"/>
  <rect x="170" y="138" width="100" height="22" rx="11" fill="#1F2733"/>
  <text x="92" y="180" font-size="12" font-weight="600" fill="#2A3547">9:41</text><rect x="322" y="170" width="26" height="12" rx="3" fill="#2A3547"/><rect x="350" y="173" width="3" height="6" rx="1.5" fill="#2A3547"/>
  <!-- messages header -->
  <use href="#ar" x="90" y="196" width="20" height="16" transform="scale(1)"/>
  <path d="M92 212 H110 M99 205 l-7 7 7 7" fill="none" stroke="#5A6A85" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="208" cy="212" r="15" fill="#c479c2"/><text x="208" y="217" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">S</text>
  <text x="220" y="208" font-size="12.5" font-weight="700" fill="#2A3547" text-anchor="middle">Squibbon Auto Care</text><text x="220" y="224" font-size="10" fill="#8A95A5" text-anchor="middle">Text message</text>
  <line x1="90" y1="244" x2="350" y2="244" stroke="#EEF1F4"/>
  <text x="220" y="272" font-size="10" fill="#9AA4B2" text-anchor="middle">Today 4:32 PM</text>
  <!-- incoming bubble -->
  <path d="M104 290 q-14 0 -14 14 v92 q0 14 14 14 h168 q14 0 14-14 v-92 q0-14-14-14 h-150 l-8-8 -8 8z" fill="#EEF1F6"/>
  <text x="112" y="316" font-size="12.5" fill="#2A3547">Hi Maria! Thanks for visiting</text>
  <text x="112" y="336" font-size="12.5" fill="#2A3547">Squibbon Auto Care 🔧 for your</text>
  <text x="112" y="356" font-size="12.5" fill="#2A3547">F-150 oil change.</text>
  <text x="112" y="384" font-size="12.5" fill="#2A3547">How did we do? Tap to rate:</text>
  <text x="112" y="404" font-size="12.5" font-weight="600" fill="#1A5FB4">sqb.bn/r/4f2a</text>
  <!-- consent footer bubble -->
  <text x="112" y="446" font-size="11" fill="#9AA4B2">Reply STOP to unsubscribe ·</text>
  <text x="112" y="462" font-size="11" fill="#9AA4B2">Répondez ARRÊT pour vous désabonner</text>
  <!-- input bar -->
  <rect x="90" y="720" width="220" height="34" rx="17" fill="#F4F6FB"/><text x="106" y="741" font-size="11.5" fill="#9AA4B2">Text message</text>
  <circle cx="332" cy="737" r="17" fill="#c479c2"/><path d="M340 729 l-12 8 5 -8 -5 -8z" fill="#fff"/>
  <text x="220" y="828" class="cap" font-size="14" text-anchor="middle">1 · SMS / email request</text>
  <text x="220" y="850" class="capm" font-size="11.5" text-anchor="middle">Sender ID + STOP keyword (CASL)</text>

  <use href="#ar" x="392" y="430" width="32" height="18"/>

  <!-- ===== PHONE B — RATING ===== -->
  <g filter="url(#ph)"><rect x="440" y="120" width="320" height="660" rx="42" fill="#1F2733"/></g>
  <rect x="450" y="130" width="300" height="640" rx="34" fill="#FFFFFF"/>
  <rect x="550" y="138" width="100" height="22" rx="11" fill="#1F2733"/>
  <text x="472" y="180" font-size="12" font-weight="600" fill="#2A3547">9:41</text><rect x="702" y="170" width="26" height="12" rx="3" fill="#2A3547"/><rect x="730" y="173" width="3" height="6" rx="1.5" fill="#2A3547"/>
  <!-- branded header -->
  <rect x="450" y="196" width="300" height="96" fill="#FBF3FB"/>
  <circle cx="600" cy="236" r="26" fill="#c479c2"/><text x="600" y="244" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">S</text>
  <text x="600" y="280" font-size="14" font-weight="700" fill="#2A3547" text-anchor="middle">Squibbon Auto Care</text>
  <text x="600" y="340" font-size="18" font-weight="700" fill="#2A3547" text-anchor="middle">How was your visit?</text>
  <text x="600" y="368" font-size="12.5" fill="#5A6A85" text-anchor="middle">2019 Ford F-150 · Oil change</text>
  <text x="600" y="388" font-size="11.5" fill="#9AA4B2" text-anchor="middle">Fri, Jun 19 · Advisor T. Hopper</text>
  <!-- stars -->
  <use href="#ostar" x="484" y="420" width="44" height="44"/>
  <use href="#ostar" x="532" y="420" width="44" height="44"/>
  <use href="#ostar" x="580" y="420" width="44" height="44"/>
  <use href="#ostar" x="628" y="420" width="44" height="44"/>
  <use href="#ostar" x="676" y="420" width="44" height="44"/>
  <text x="600" y="496" font-size="12" fill="#8A95A5" text-anchor="middle">Tap a star to rate</text>
  <!-- comment field -->
  <rect x="484" y="520" width="232" height="74" rx="12" fill="#F7F9FC" stroke="#E8EDF3"/><text x="500" y="544" font-size="11.5" fill="#9AA4B2">Tell us more (optional)…</text>
  <rect x="484" y="612" width="232" height="46" rx="12" fill="#E7E9EE"/><text x="600" y="640" font-size="13.5" font-weight="600" fill="#A6AEBC" text-anchor="middle">Submit</text>
  <text x="600" y="700" font-size="10.5" fill="#9AA4B2" text-anchor="middle">Powered by Squibbon · your feedback</text>
  <text x="600" y="716" font-size="10.5" fill="#9AA4B2" text-anchor="middle">goes straight to the shop</text>
  <text x="600" y="828" class="cap" font-size="14" text-anchor="middle">2 · Rate your visit</text>
  <text x="600" y="850" class="capm" font-size="11.5" text-anchor="middle">Branded landing · 1 tap</text>

  <use href="#ar" x="772" y="430" width="32" height="18"/>

  <!-- ===== PHONE C — RESULT ===== -->
  <g filter="url(#ph)"><rect x="820" y="120" width="320" height="660" rx="42" fill="#1F2733"/></g>
  <rect x="830" y="130" width="300" height="640" rx="34" fill="#FFFFFF"/>
  <rect x="930" y="138" width="100" height="22" rx="11" fill="#1F2733"/>
  <text x="852" y="180" font-size="12" font-weight="600" fill="#2A3547">9:41</text><rect x="1082" y="170" width="26" height="12" rx="3" fill="#2A3547"/><rect x="1110" y="173" width="3" height="6" rx="1.5" fill="#2A3547"/>
  <circle cx="980" cy="244" r="32" fill="#E6FBF5"/><path d="M966 244 l10 10 18-20" fill="none" stroke="#0F9C96" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="980" y="300" font-size="19" font-weight="700" fill="#2A3547" text-anchor="middle">Thanks, Maria! 🎉</text>
  <use href="#bstar" x="900" y="320" width="32" height="32"/><use href="#bstar" x="932" y="320" width="32" height="32"/><use href="#bstar" x="964" y="320" width="32" height="32"/><use href="#bstar" x="996" y="320" width="32" height="32"/><use href="#bstar" x="1028" y="320" width="32" height="32"/>
  <text x="980" y="388" font-size="13" fill="#5A6A85" text-anchor="middle">So glad we hit the mark. Mind</text>
  <text x="980" y="408" font-size="13" fill="#5A6A85" text-anchor="middle">sharing it where it helps most?</text>
  <!-- Google button -->
  <rect x="864" y="436" width="232" height="50" rx="12" fill="#FFFFFF" stroke="#DDE3EC"/><circle cx="900" cy="461" r="11" fill="#fff" stroke="#E2E8F0"/><text x="900" y="466" font-size="14" font-weight="700" fill="#1A73E8" text-anchor="middle">G</text><text x="990" y="466" font-size="13.5" font-weight="600" fill="#2A3547" text-anchor="middle">Review on Google</text>
  <!-- Facebook button -->
  <rect x="864" y="496" width="232" height="50" rx="12" fill="#FFFFFF" stroke="#DDE3EC"/><circle cx="900" cy="521" r="11" fill="#EAF0FB"/><text x="900" y="526" font-size="14" font-weight="700" fill="#1877F2" text-anchor="middle">f</text><text x="990" y="526" font-size="13.5" font-weight="600" fill="#2A3547" text-anchor="middle">Review on Facebook</text>
  <text x="980" y="582" font-size="12.5" font-weight="600" fill="#8A95A5" text-anchor="middle">Maybe later</text>
  <line x1="864" y1="610" x2="1096" y2="610" stroke="#EEF1F4"/>
  <rect x="864" y="626" width="232" height="92" rx="12" fill="#FFFBF2" stroke="#F0DFBE"/>
  <text x="880" y="650" font-size="11.5" font-weight="700" fill="#A8720F">If rated ★★★ or below</text>
  <text x="880" y="670" font-size="11" fill="#7A6328">A private feedback form opens so</text>
  <text x="880" y="686" font-size="11" fill="#7A6328">the shop can make it right — and the</text>
  <text x="880" y="702" font-size="11" fill="#7A6328">public review links stay available too.</text>
  <text x="980" y="828" class="cap" font-size="14" text-anchor="middle">3 · Public + private</text>
  <text x="980" y="850" class="capm" font-size="11.5" text-anchor="middle">No gating — never blocks a public post</text>
</svg>
