    .h{fill:#2A3547;font-weight:600}.sub{fill:#3A4456;font-weight:400}.lbl{fill:#8A95A5;font-weight:600}.cell{fill:#2A3547;font-weight:500}.mut{fill:#8A95A5;font-weight:500}.lnk{fill:#c479c2;font-weight:600}.val{fill:#2A3547;font-weight:600}.step{fill:#2A3547;font-weight:500}
  </style>
  <rect width="1440" height="860" fill="#F4F6FB"/>
  <rect x="0" y="0" width="256" height="860" fill="#FFFFFF"/><line x1="256" y1="0" x2="256" y2="860" stroke="#ECEFF4"/>
  <rect x="24" y="21" width="30" height="30" rx="8" fill="#c479c2"/><text x="39" y="42" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">S</text><text x="66" y="42" font-size="19" font-weight="700" fill="#2A3547">Squibbon</text>
  <rect x="170" y="26" width="58" height="18" rx="9" fill="#E6FBFA"/><text x="199" y="39" font-size="10.5" font-weight="700" fill="#0F9C96" text-anchor="middle">SHOP</text>
  <text x="24" y="90" class="col" font-size="11">SHOP</text>
  <g style="color:#5A6A85"><use href="#ic-grid" x="22" y="100" width="18" height="18"/></g><text x="50" y="114" class="navi" font-size="12.5">Dashboard</text>
  <g style="color:#5A6A85"><use href="#ic-board" x="22" y="138" width="18" height="18"/></g><text x="50" y="152" class="navi" font-size="12.5">Workflow</text>
  <rect x="12" y="172" width="232" height="28" rx="7" fill="#FFEBFE"/>
  <g style="color:#c479c2"><use href="#ic-clip" x="22" y="177" width="18" height="18"/></g><text x="50" y="191" font-size="12.5" font-weight="600" fill="#c479c2">Work orders</text>
  <g style="color:#5A6A85"><use href="#ic-user" x="22" y="214" width="18" height="18"/></g><text x="50" y="228" class="navi" font-size="12.5">Customers</text>
  <g style="color:#5A6A85"><use href="#ic-truck" x="22" y="252" width="18" height="18"/></g><text x="50" y="266" class="navi" font-size="12.5">Vehicles</text>
  <text x="24" y="304" class="col" font-size="11">PARTS &amp; VENDORS</text>
  <g style="color:#5A6A85"><use href="#ic-box" x="22" y="314" width="18" height="18"/></g><text x="50" y="328" class="navi" font-size="12.5">Inventory / parts</text>
  <g style="color:#5A6A85"><use href="#ic-cart" x="22" y="352" width="18" height="18"/></g><text x="50" y="366" class="navi" font-size="12.5">Purchase orders</text>
  <g style="color:#5A6A85"><use href="#ic-building" x="22" y="390" width="18" height="18"/></g><text x="50" y="404" class="navi" font-size="12.5">Vendors</text>
  <text x="24" y="442" class="col" font-size="11">BILLING</text>
  <g style="color:#5A6A85"><use href="#ic-bill" x="22" y="452" width="18" height="18"/></g><text x="50" y="466" class="navi" font-size="12.5">Invoices</text>
  <g style="color:#5A6A85"><use href="#ic-card" x="22" y="490" width="18" height="18"/></g><text x="50" y="504" class="navi" font-size="12.5">Payments</text>
  <g style="color:#5A6A85"><use href="#ic-chart" x="22" y="528" width="18" height="18"/></g><text x="50" y="542" class="navi" font-size="12.5">Reports</text>
  <text x="24" y="580" class="col" font-size="11">SETTINGS</text>
  <g style="color:#5A6A85"><use href="#ic-slider" x="22" y="590" width="18" height="18"/></g><text x="50" y="604" class="navi" font-size="12.5">Shop settings</text>

  <rect x="256" y="0" width="1184" height="72" fill="#FFFFFF"/><line x1="256" y1="72" x2="1440" y2="72" stroke="#ECEFF4"/>
  <g style="color:#5A6A85"><use href="#ic-menu" x="282" y="26" width="20" height="20"/></g>
  <rect x="324" y="18" width="300" height="36" rx="18" fill="#F4F6FB"/><g style="color:#8A95A5"><use href="#ic-search" x="340" y="27" width="18" height="18"/></g><text x="366" y="41" font-size="12.5" fill="#9AA4B2">Search procedures, DTCs, TSBs…</text>
  <rect x="1118" y="17" width="160" height="38" rx="8" fill="#c479c2"/><g style="color:#FFFFFF"><use href="#ic-pin" x="1146" y="28" width="16" height="16"/></g><text x="1176" y="41" font-size="12.5" font-weight="600" fill="#FFFFFF">Attach to job</text>
  <g style="color:#5A6A85"><use href="#ic-bell" x="1300" y="26" width="20" height="20"/></g><circle cx="1317" cy="27" r="4" fill="#FA5A5A"/>
  <text x="1368" y="33" font-size="12.5" font-weight="600" fill="#2A3547" text-anchor="end">A. Roy</text><text x="1368" y="47" font-size="10.5" fill="#8A95A5" text-anchor="end">Technician</text>
  <circle cx="1392" cy="36" r="16" fill="#E6FBFA"/><text x="1392" y="40" font-size="12" font-weight="700" fill="#0F9C96" text-anchor="middle">AR</text>

  <text x="280" y="114" font-size="20" font-weight="700" fill="#2A3547">Front brakes — Replace pads &amp; rotors</text>
  <rect x="744" y="99" width="96" height="22" rx="11" fill="#FBF3FB"/><text x="792" y="114" class="pill" font-size="10.5" font-weight="700" fill="#c479c2" text-anchor="middle">ProDemand</text>
  <text x="280" y="136" font-size="12.5" fill="#5A6A85">2019 Ford F-150 5.0L · WO-10428 · job: Front brake service</text>

  <!-- tabs -->
  <g font-size="12.5" font-weight="600">
  <text x="288" y="166" fill="#c479c2">Procedure</text><rect x="284" y="174" width="68" height="3" rx="1.5" fill="#c479c2"/>
  <text x="372" y="166" fill="#5A6A85">Torque specs</text>
  <text x="476" y="166" fill="#5A6A85">TSBs</text>
  <text x="536" y="166" fill="#5A6A85">Wiring</text>
  <text x="606" y="166" fill="#5A6A85">ADAS</text>
  <text x="668" y="166" fill="#5A6A85">DTC lookup</text>
  </g>
  <line x1="280" y1="182" x2="1416" y2="182" stroke="#ECEFF4"/>

  <!-- LEFT: procedure -->
  <rect x="280" y="196" width="712" height="624" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="304" y="228" class="h" font-size="15">Removal</text>
  <g font-size="12.5">
  <circle cx="312" cy="252" r="10" fill="#FBF3FB"/><text x="312" y="256" font-size="11" font-weight="700" fill="#c479c2" text-anchor="middle">1</text><text x="334" y="256" class="step">Loosen wheel lug nuts. Raise and support the vehicle, then remove the front wheels.</text>
  <circle cx="312" cy="288" r="10" fill="#FBF3FB"/><text x="312" y="292" font-size="11" font-weight="700" fill="#c479c2" text-anchor="middle">2</text><text x="334" y="292" class="step">Remove the 2 caliper guide-pin bolts. Suspend the caliper — do not let it hang by the hose.</text>
  <circle cx="312" cy="324" r="10" fill="#FBF3FB"/><text x="312" y="328" font-size="11" font-weight="700" fill="#c479c2" text-anchor="middle">3</text><text x="334" y="328" class="step">Remove the brake pads. Remove the 2 caliper bracket bolts <tspan class="mut">(148 ft-lb on reinstall)</tspan>.</text>
  <circle cx="312" cy="360" r="10" fill="#FBF3FB"/><text x="312" y="364" font-size="11" font-weight="700" fill="#c479c2" text-anchor="middle">4</text><text x="334" y="364" class="step">Remove the rotor retaining clip and slide the rotor off the hub.</text>
  </g>
  <text x="304" y="412" class="h" font-size="15">Installation</text>
  <g font-size="12.5">
  <circle cx="312" cy="436" r="10" fill="#E6FBFA"/><text x="312" y="440" font-size="11" font-weight="700" fill="#0F9C96" text-anchor="middle">5</text><text x="334" y="440" class="step">Clean the hub mounting face. Install the new rotor.</text>
  <circle cx="312" cy="472" r="10" fill="#E6FBFA"/><text x="312" y="476" font-size="11" font-weight="700" fill="#0F9C96" text-anchor="middle">6</text><text x="334" y="476" class="step">Install the caliper bracket. Torque bolts to <tspan class="val">148 ft-lb (200 N·m)</tspan>.</text>
  <circle cx="312" cy="508" r="10" fill="#E6FBFA"/><text x="312" y="512" font-size="11" font-weight="700" fill="#0F9C96" text-anchor="middle">7</text><text x="334" y="512" class="step">Fit new pads. Install caliper; torque guide-pin bolts to <tspan class="val">31 ft-lb (42 N·m)</tspan>.</text>
  <circle cx="312" cy="544" r="10" fill="#E6FBFA"/><text x="312" y="548" font-size="11" font-weight="700" fill="#0F9C96" text-anchor="middle">8</text><text x="334" y="548" class="step">Refit wheels; torque lug nuts to <tspan class="val">150 ft-lb</tspan> in a star pattern. Bed-in the pads.</text>
  </g>
  <rect x="304" y="580" width="664" height="58" rx="9" fill="#FFFBF2" stroke="#F0DFBE"/>
  <text x="322" y="603" class="lbl" font-size="10.5" fill="#A8720F">⚠ CAUTION</text><text x="322" y="622" class="sub" font-size="12">Do not depress the brake pedal with the caliper removed. Re-torque lug nuts after 100 km.</text>
  <text x="304" y="668" class="h" font-size="14">Fluid &amp; capacities</text>
  <g font-size="12.5"><text x="304" y="694" class="cell">Brake fluid</text><text x="500" y="694" class="sub">DOT 3 · system 0.9 L</text>
  <text x="304" y="720" class="cell">Pad min thickness</text><text x="500" y="720" class="sub">3.0 mm</text>
  <text x="304" y="746" class="cell">Rotor min / discard</text><text x="500" y="746" class="sub">26.0 mm</text>
  <text x="304" y="772" class="cell">Rotor runout max</text><text x="500" y="772" class="sub">0.05 mm</text></g>
  <text x="304" y="804" class="lnk" font-size="12">Open interactive procedure in ProDemand →</text>

  <!-- RIGHT: side cards -->
  <!-- torque specs -->
  <rect x="1008" y="196" width="408" height="130" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="1028" y="224" class="h" font-size="14">Torque specs</text>
  <g font-size="12.5"><text x="1028" y="252" class="cell">Wheel lug nut</text><text x="1396" y="252" class="val" text-anchor="end">150 ft-lb</text>
  <line x1="1028" y1="264" x2="1396" y2="264" stroke="#F4F6FA"/>
  <text x="1028" y="286" class="cell">Caliper bracket bolt</text><text x="1396" y="286" class="val" text-anchor="end">148 ft-lb</text>
  <line x1="1028" y1="298" x2="1396" y2="298" stroke="#F4F6FA"/>
  <text x="1028" y="320" class="cell">Caliper guide-pin bolt</text><text x="1396" y="320" class="val" text-anchor="end">31 ft-lb</text></g>

  <!-- TSB -->
  <rect x="1008" y="342" width="408" height="96" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <rect x="1028" y="362" width="60" height="20" rx="10" fill="#EAF2FE"/><text x="1058" y="376" font-size="10" font-weight="700" fill="#1A5FB4" text-anchor="middle">TSB</text>
  <text x="1098" y="377" class="val" font-size="12.5">21-2145</text>
  <text x="1028" y="402" class="cell" font-size="12.5">Brake roughness / judder at highway speed</text>
  <text x="1028" y="422" class="mut" font-size="11">Updated rotor spec &amp; bed-in procedure · open →</text>

  <!-- ADAS quick ref -->
  <rect x="1008" y="454" width="408" height="118" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <g style="color:#c479c2"><use href="#ic-bolt" x="1028" y="472" width="18" height="18"/></g><text x="1054" y="486" class="h" font-size="14">ADAS quick-reference</text>
  <text x="1028" y="512" class="cell" font-size="12">Forward camera (windshield)</text><rect x="1300" y="500" width="96" height="20" rx="10" fill="#FBEFD3"/><text x="1348" y="514" font-size="9.5" font-weight="700" fill="#A8720F" text-anchor="middle">Dynamic calib.</text>
  <text x="1028" y="538" class="cell" font-size="12">Front radar (grille)</text><rect x="1300" y="526" width="96" height="20" rx="10" fill="#EAF2FE"/><text x="1348" y="540" font-size="9.5" font-weight="700" fill="#1A5FB4" text-anchor="middle">Static calib.</text>
  <text x="1028" y="562" class="mut" font-size="10.5">Required if windshield / bumper is R&amp;R'd → ADAS job.</text>

  <!-- wiring -->
  <rect x="1008" y="588" width="196" height="232" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="1028" y="616" class="h" font-size="13.5">Wiring</text><text x="1028" y="634" class="mut" font-size="10.5">Front ABS sensor</text>
  <rect x="1028" y="646" width="156" height="150" rx="8" fill="#F7F9FC" stroke="#E8EDF3"/>
  <g stroke="#9AA4B2" stroke-width="1.4" fill="none"><path d="M1044 676 h40 v-18 h40"/><path d="M1044 706 h70 v20 h30"/><path d="M1044 736 h50"/></g>
  <g fill="#c479c2"><circle cx="1044" cy="676" r="3"/><circle cx="1124" cy="658" r="3"/><circle cx="1044" cy="706" r="3"/><circle cx="1144" cy="726" r="3"/></g>
  <rect x="1096" y="700" width="26" height="16" rx="2" fill="#fff" stroke="#9AA4B2"/>
  <text x="1106" y="784" class="lnk" font-size="10.5" text-anchor="middle">Open diagram →</text>

  <!-- DTC -->
  <rect x="1216" y="588" width="200" height="232" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="1236" y="616" class="h" font-size="13.5">DTC lookup</text>
  <rect x="1236" y="630" width="160" height="30" rx="8" fill="#F4F6FB"/><text x="1248" y="650" class="val" font-size="13">C0561</text>
  <text x="1236" y="684" class="cell" font-size="12">System Disabled —</text><text x="1236" y="702" class="cell" font-size="12">Information Stored</text>
  <text x="1236" y="726" class="mut" font-size="10.5">ABS module · often set</text><text x="1236" y="742" class="mut" font-size="10.5">with low battery / open</text><text x="1236" y="758" class="mut" font-size="10.5">wheel-speed circuit.</text>
  <rect x="1236" y="772" width="160" height="30" rx="7" fill="#FFEBFE"/><text x="1316" y="792" class="lnk" font-size="11" text-anchor="middle">Open procedure →</text>
</svg>
