  <rect x="280" y="224" width="620" height="534" rx="12" fill="#FFFFFF" stroke="#ECEFF4" filter="url(#sh)"/>
  <text x="304" y="254" class="h" font-size="15">HV safety workflow</text>
  <rect x="760" y="238" width="116" height="24" rx="12" fill="#E6FBF5"/><text x="818" y="254" class="pill" font-size="10.5" fill="#0F9C96" text-anchor="middle">7 / 8 complete</text>
  <line x1="304" y1="270" x2="876" y2="270" stroke="#ECEFF4"/>
  <!-- gate -->
  <rect x="304" y="282" width="572" height="48" rx="10" fill="#E6FBF5" stroke="#BDEBDD"/>
  <rect x="318" y="294" width="22" height="22" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="296" width="18" height="18"/></g>
  <text x="352" y="304" class="val" font-size="12.5">HV-certified technician assigned (gate)</text><text x="352" y="322" class="mut" font-size="10.5">A. Roy · cert #HV-4471 · only certified techs can be assigned</text>
