  <text x="948" y="622" class="h" font-size="14">HV service record &amp; certification</text>
  <line x1="948" y1="636" x2="1392" y2="636" stroke="#ECEFF4"/>
  <g font-size="12.5">
  <text x="948" y="662" class="cell">Technician</text><text x="1392" y="662" class="val" text-anchor="end">A. Roy · HV-4471</text>
  <text x="948" y="686" class="cell">Certification expiry</text><text x="1392" y="686" class="val" text-anchor="end">Mar 2027 · valid</text>
  </g>
  <rect x="948" y="704" width="444" height="38" rx="9" fill="#F4F6FB"/><g style="color:#5A6A85"><use href="#ic-check" x="966" y="713" width="18" height="18"/></g><text x="992" y="728" class="cell" font-size="12">Checklist, readings &amp; cert generate a signed HV service record.</text>
