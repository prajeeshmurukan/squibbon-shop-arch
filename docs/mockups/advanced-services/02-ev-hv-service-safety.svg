  <text x="280" y="116" font-size="22" font-weight="700" fill="#2A3547">EV high-voltage service — WO-10540</text>
  <text x="280" y="138" font-size="13" fill="#5A6A85">2023 Ford F-150 Lightning · complete the HV safety protocol before any high-voltage work</text>

  <!-- EV banner -->
  <rect x="280" y="156" width="1136" height="52" rx="12" fill="#FFF6F4" stroke="#F3D6CF"/>
  <g style="color:#C0392B"><use href="#ic-bolt" x="300" y="170" width="22" height="22"/></g>
  <text x="332" y="178" class="lbl" font-size="10" fill="#C0392B">HIGH-VOLTAGE VEHICLE · ~400 V</text>
  <text x="332" y="196" class="cell" font-size="12.5">HV work is locked until the safety checklist is complete and an HV-certified technician is assigned.</text>
  <text x="1396" y="188" class="pill" font-size="11" fill="#C0392B" text-anchor="end">Risk of electric shock</text>

