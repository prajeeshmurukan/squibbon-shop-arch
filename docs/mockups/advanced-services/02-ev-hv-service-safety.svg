  <g font-size="12.5">
  <rect x="318" y="346" width="20" height="20" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="348" width="16" height="16"/></g><text x="350" y="360" class="cell">PPE verified — Class 0 insulating gloves (tested), face shield</text>
  <rect x="318" y="378" width="20" height="20" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="380" width="16" height="16"/></g><text x="350" y="392" class="cell">Ignition off · key removed · 12 V aux disconnected</text>
  <rect x="318" y="410" width="20" height="20" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="412" width="16" height="16"/></g><text x="350" y="424" class="cell">Manual service disconnect (MSD) removed</text>
  <rect x="318" y="442" width="20" height="20" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="444" width="16" height="16"/></g><text x="350" y="456" class="cell">Lockout / tagout applied to the HV system</text>
  <rect x="318" y="474" width="20" height="20" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="476" width="16" height="16"/></g><text x="350" y="486" class="cell">Insulated tools &amp; HV-rated meter (CAT III) in use</text>
  <rect x="318" y="506" width="20" height="20" rx="6" fill="#0F9C96"/><g style="color:#fff"><use href="#ic-check" x="320" y="508" width="16" height="16"/></g><text x="350" y="518" class="cell">Warning barriers / "HV — do not touch" placed</text>
  <rect x="318" y="538" width="20" height="20" rx="6" fill="#FFFFFF" stroke="#C0392B" stroke-width="1.5"/><text x="350" y="550" class="cell" fill="#C0392B" font-weight="600">Verify de-energized — measure &lt; 60 V at the pack</text>
  </g>
  <rect x="304" y="576" width="572" height="58" rx="10" fill="#FFF6F4" stroke="#F3D6CF"/>
  <g style="color:#C0392B"><use href="#ic-bolt" x="322" y="592" width="18" height="18"/></g>
  <text x="350" y="600" class="val" font-size="12">Final step pending — measure pack voltage</text><text x="350" y="618" class="mut" font-size="11">Record the measured voltage to release the lock and enable HV work.</text>
  <rect x="304" y="650" width="572" height="92" rx="10" fill="#F4F6FB"/>
  <text x="324" y="676" class="lbl" font-size="10">PROTOCOL</text>
  <text x="324" y="698" class="mut" font-size="11.5">Steps follow OEM de-energization &amp; lockout procedure. "Start HV work" stays disabled</text>
  <text x="324" y="716" class="mut" font-size="11.5">until every item — including the &lt; 60 V verification — is checked. The completed checklist,</text>
  <text x="324" y="734" class="mut" font-size="11.5">technician cert and readings are stored on the work order.</text>

