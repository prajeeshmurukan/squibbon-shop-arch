  <text x="948" y="300" class="lbl" font-size="10">STATE OF HEALTH</text><text x="948" y="332" class="val" font-size="30" fill="#0F9C96">92%</text>
  <rect x="1080" y="312" width="312" height="14" rx="7" fill="#EEF1F6"/><rect x="1080" y="312" width="287" height="14" rx="7" fill="#16CDC7"/>
  <g font-size="12.5">
  <text x="948" y="372" class="cell">Usable capacity</text><text x="1392" y="372" class="val" text-anchor="end">71.4 / 77.6 kWh</text>
  <line x1="948" y1="386" x2="1392" y2="386" stroke="#F4F6FA"/>
  <text x="948" y="410" class="cell">Cell balance (max Δ)</text><text x="1392" y="410" class="val" text-anchor="end">±18 mV · OK</text>
  <line x1="948" y1="424" x2="1392" y2="424" stroke="#F4F6FA"/>
  <text x="948" y="448" class="cell">Isolation resistance</text><text x="1392" y="448" class="val" text-anchor="end">850 Ω/V · OK</text>
  <line x1="948" y1="462" x2="1392" y2="462" stroke="#F4F6FA"/>
  <text x="948" y="486" class="cell">Pack temperature</text><text x="1392" y="486" class="val" text-anchor="end">28 °C</text>
  <line x1="948" y1="500" x2="1392" y2="500" stroke="#F4F6FA"/>
  <text x="948" y="524" class="cell">Stored DTCs</text><text x="1392" y="524" class="val" text-anchor="end" fill="#0F9C96">None</text>
  </g>
  <rect x="948" y="540" width="444" height="22" /><text x="948" y="555" class="mut" font-size="10.5">Read over the diagnostic link before isolation · captured to the HV record.</text>

